- name: Rocky Linux Server Config (By Alireza_EVO)
  hosts: all
  become: yes

  vars:

    ntp_server: "x.x.x.x"

    users:
      - "Users"

    dns_servers:
      - x.x.x.x
      - x.x.x.x
      - x.x.x.x

    dest_dir: "/usr/share/zabbix-sql-scripts/postgresql"
    dest_file: "/usr/share/zabbix-sql-scripts/postgresql/proxy.sql"

    db_name: "zabbix_proxy"
    db_username: "zabbix"
    db_password: "CHANGEME!!!!"

  tasks:

#################################################
# DNS CONFIG
#################################################

  - name: Configure resolv.conf
    ansible.builtin.copy:
      dest: /etc/resolv.conf
      content: |
        # Generated By Ansible
        {% for server in dns_servers %}
        nameserver {{ server }}
        {% endfor %}
      owner: root
      group: root
      mode: "0644"
      backup: yes

#################################################
# USER MANAGEMENT
#################################################

  - name: Ensure wheel group exists
    ansible.builtin.group:
      name: wheel
      state: present

  - name: Create admin users
    ansible.builtin.user:
      name: "{{ item }}"
      groups: wheel
      append: yes
      create_home: yes
      state: present
    loop: "{{ users }}"

  - name: Configure passwordless sudo for a.farmani
    ansible.builtin.copy:
      dest: /etc/sudoers.d/a_farmani
      content: "a.farmani ALL=(ALL) NOPASSWD: ALL\n"
      mode: "0440"
      validate: /usr/sbin/visudo -cf %s

#################################################
# SECURITY CONFIG
#################################################

  - name: Disable SELinux immediately
    ansible.builtin.command: setenforce 0
    ignore_errors: yes
    changed_when: false

  - name: Disable SELinux permanently
    ansible.builtin.lineinfile:
      path: /etc/selinux/config
      regexp: '^SELINUX='
      line: 'SELINUX=disabled'

  - name: Stop and disable firewalld
    ansible.builtin.systemd:
      name: firewalld
      state: stopped
      enabled: false


#################################################
#                 NTP CONFIG
#################################################

  - name: Install chrony
    ansible.builtin.dnf:
      name: chrony
      state: present

  - name: Configure chrony server
    ansible.builtin.blockinfile:
      path: /etc/chrony.conf
      marker: "# {mark} ANSIBLE MANAGED NTP"
      block: |
        server {{ ntp_server }} iburst

  - name: Enable chronyd
    ansible.builtin.systemd:
      name: chronyd
      state: started
      enabled: yes


#################################################
#               Connect To Repo                 #
#################################################

  - name: Configure Custom Rocky Linux Repositories
    hosts: all
    become: yes
    tasks:
      - name: Create Rocky AppStream repository
        ansible.builtin.yum_repository:
          name: rocky-appstream
          file: rocky-appstream
          description: Rocky Linux 9.4 - AppStream
          baseurl: X.X.X.X
          enabled: true
          gpgcheck: false

      - name: Create Rocky CRB repository
        ansible.builtin.yum_repository:
          name: rocky-crb
          file: rocky-crb
          description: Rocky Linux 9.4 - CRB
          baseurl: X.X.X.X
          enabled: true
          gpgcheck: false

      - name: Clean YUM cache
        ansible.builtin.command:
          cmd: yum clean all

      - name: Make YUM cache
        ansible.builtin.command:
          cmd: yum makecache -y

      - name: Run YUM repolist
        ansible.builtin.command:
          cmd: yum repolist
        register: repolist_result
        changed_when: false

      - name: Display YUM repolist output
        ansible.builtin.debug:
          var: repolist_result.stdout_lines


#################################################
#    Install Zabbix-Proxy - Postgresql-16       #
#################################################


  - name: Install Zabbix Proxy and PostgreSQL 16 packages
      ansible.builtin.dnf:
        name:
          - zabbix-proxy-pgsql
          - postgresql16
          - postgresql16-server
        state: present


#################################################
# POSTGRESQL DATABASE CONFIG
#################################################

  - name: Check if PostgreSQL user exists
    ansible.builtin.command:
      cmd: psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='{{ db_username }}';"
    become_user: postgres
    register: user_exists
    changed_when: false

  - name: Create PostgreSQL user
    ansible.builtin.command:
      cmd: psql -c "CREATE USER {{ db_username }} WITH PASSWORD '{{ db_password }}';"
    become_user: postgres
    when: user_exists.stdout != "1"

  - name: Check if PostgreSQL database exists
    ansible.builtin.command:
      cmd: psql -tAc "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}';"
    become_user: postgres
    register: db_exists
    changed_when: false

  - name: Create PostgreSQL database
    ansible.builtin.command:
      cmd: psql -c "CREATE DATABASE {{ db_name }} OWNER {{ db_username }};"
    become_user: postgres
    when: db_exists.stdout != "1"

#################################################
# SQL FILE - Important Packages
#################################################

  - name: Ensure SQL directory exists
    ansible.builtin.file:
      path: "{{ dest_dir }}"
      state: directory
      mode: "0755"


  - name: Copy RPM packages to target machines
    ansible.builtin.copy:
      src: "{{ item }}"
      dest: "/opt/{{ item }}"
      mode: "0644"
    loop:
      - fping-5.1-1.el9.x86_64.rpm
      - net-snmp-libs-5.9.1-13.el9_4.3.x86_64.rpm


  - name: Copy proxy.sql to target machines
    ansible.builtin.copy:
      src: proxy.sql
      dest: "{{ dest_dir }}/proxy.sql"
      mode: "0644"


  - name: Install required RPM packages
    ansible.builtin.dnf:
      name:
        - /opt/fping-5.1-1.el9.x86_64.rpm
        - /opt/net-snmp-libs-5.9.1-13.el9_4.3.x86_64.rpm
      state: present

#################################################
# IMPORT ZABBIX SCHEMA
#################################################

  - name: Check if Zabbix schema already exists
    ansible.builtin.command:
      cmd: >
        psql -tAc
        "SELECT 1 FROM information_schema.tables
        WHERE table_schema='public'
        AND table_name='hosts';"
    become_user: postgres
    register: schema_check
    changed_when: false
    failed_when: false

  - name: Import Zabbix proxy schema
    ansible.builtin.command:
      cmd: psql -U {{ db_username }} -d {{ db_name }} -f {{ dest_file }}
    become_user: postgres
    when: schema_check.stdout != "1"

#################################################
# ZABBIX PROXY CONFIG
#################################################

  - name: Configure Zabbix Proxy
    ansible.builtin.lineinfile:
      path: /etc/zabbix/zabbix_proxy.conf
      regexp: '^#?\s*{{ item.key }}\s*=.*$'
      line: "{{ item.key }}={{ item.value }}"
      backup: yes
    loop:
      - { key: 'Server', value: 'X.X.X.X' }
      - { key: 'Hostname', value: '{{ ansible_hostname }}' }
      - { key: 'LogFile', value: '/var/log/zabbix/zabbix_proxy.log' }
      - { key: 'LogFileSize', value: '0' }
      - { key: 'DebugLevel', value: '3' }
      - { key: 'PidFile', value: '/run/zabbix/zabbix_proxy.pid' }
      - { key: 'SocketDir', value: '/run/zabbix' }
      - { key: 'DBName', value: '{{ db_name }}' }
      - { key: 'DBSchema', value: 'public' }
      - { key: 'DBUser', value: '{{ db_username }}' }
      - { key: 'DBPassword', value: '{{ db_password }}' }
      - { key: 'ProxyBufferMode', value: 'hybrid' }
      - { key: 'ProxyMemoryBufferSize', value: '64M' }
      - { key: 'StartPollers', value: '1000' }
      - { key: 'StartAgentPollers', value: '1000' }
      - { key: 'StartHTTPAgentPollers', value: '500' }
      - { key: 'StartSNMPPollers', value: '1000' }
      - { key: 'StartPreprocessors', value: '200' }
      - { key: 'StartPollersUnreachable', value: '200' }
      - { key: 'StartTrappers', value: '100' }
      - { key: 'StartPingers', value: '1000' }
      - { key: 'StartHTTPPollers', value: '100' }
      - { key: 'SNMPTrapperFile', value: '/var/log/snmptrap/snmptrap.log' }
      - { key: 'CacheSize', value: '8G' }
      - { key: 'HistoryCacheSize', value: '2G' }
      - { key: 'HistoryIndexCacheSize', value: '2G' }
      - { key: 'Timeout', value: '4' }
      - { key: 'LogSlowQueries', value: '3000' }
      - { key: 'StatsAllowedIP', value: 'X.X.X.X' }

#################################################
# SERVICES
#################################################

  - name: Restart PostgreSQL
    ansible.builtin.systemd:
      name: postgresql
      state: restarted
      enabled: yes

  - name: Restart Zabbix Proxy
    ansible.builtin.systemd:
      name: zabbix-proxy
      state: restarted
      enabled: yes
